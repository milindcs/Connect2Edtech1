services:
  - type: web
    name: connect2future-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /health
    autoDeploy: true

  - type: static
    name: connect2future-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://connect2future-backend.onrender.com