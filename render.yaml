services:
  - type: web
    name: connect2future-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /health
    autoDeploy: true