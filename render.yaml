services:
  # Backend
  - type: web
    name: connect2edtech-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        value: mongodb://hr_connect2future:%402026C2f@ac-rctcyky-shard-00-00.nyefwik.mongodb.net:27017,ac-rctcyky-shard-00-01.nyefwik.mongodb.net:27017,ac-rctcyky-shard-00-02.nyefwik.mongodb.net:27017/connect2future?ssl=true&replicaSet=atlas-rmgqe7-shard-0&authSource=admin&retryWrites=true&w=majority&appName=Cluster0
      - key: CORS_ORIGINS
        value: https://connect2edtech-frontend.onrender.com,http://localhost:5173,http://localhost:3000
      - key: CONTACT_EMAIL
        value: hr@connect2future.com
      - key: CONTACT_PHONE
        value: "+917019436720"
      - key: WHATSAPP_PHONE
        value: "917019436720"
      - key: FRONTEND_URL
        value: https://connect2edtech-frontend.onrender.com
    healthCheckPath: /health
    autoDeploy: true

  # Frontend
  - type: web
    name: connect2edtech-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html